<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Castle - Town Archers</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #111; color: #fff; font-family: 'Arial', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw;
        }

        #game-canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(#1a1a1a, #2c3e50); 
            border-bottom: 25px solid #3e2723;
            overflow: hidden;
        }

        /* STATUS */
        #status-bar {
            position: absolute; top: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.9); padding: 8px 20px;
            display: flex; justify-content: flex-start; gap: 30px;
            z-index: 110; border-bottom: 1px solid #444;
            font-size: 14px; color: #f1c40f; font-weight: bold;
        }

        /* UPGRADES DIREITA */
        #upgrade-row {
            position: absolute; top: 45px; right: 15px;
            display: flex; gap: 10px;
            z-index: 100;
        }

        .btn-up {
            background: #34495e; border: 2px solid #2c3e50; border-radius: 4px;
            width: 110px; height: 75px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 4px 0 #1a252f; transition: 0.1s;
        }
        .btn-up:active { transform: translateY(2px); box-shadow: 0 2px 0 #1a252f; }
        .btn-up:disabled { opacity: 0.5; filter: grayscale(1); }
        
        .btn-up .label { font-size: 9px; color: #ecf0f1; font-weight: bold; text-transform: uppercase; }
        .btn-up .price { font-size: 12px; color: #2ecc71; font-weight: bold; }

        /* CASTELO E PLATAFORMA DE ARQUEIROS */
        #castle { 
            position: absolute; left: 0; bottom: 0; 
            width: 120px; height: 50%; 
            background: #5d4037; border-right: 6px solid #3e2723; 
            z-index: 10;
        }

        #archer-platform {
            position: absolute;
            top: -30px; left: 0; width: 100%; height: 35px;
            background: #4e342e; border: 2px solid #212121;
            display: flex; justify-content: space-around; align-items: center;
            padding: 0 5px;
        }

        .town-archer { font-size: 18px; animation: breathe 2s infinite; }

        #main-hero { 
            position: absolute; bottom: 55%; left: 30px; 
            font-size: 40px; z-index: 20; animation: breathe 2.5s infinite; 
        }
        
        @keyframes breathe { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        
        .enemy { position: absolute; bottom: 0; font-size: 40px; z-index: 5; }
        .arrow { position: absolute; width: 18px; height: 3px; background: #f1c40f; border-radius: 2px; z-index: 15; }

        /* HP BAR */
        #hp-container { position: absolute; top: -50px; left: 0; width: 120px; height: 10px; background: #000; border: 1px solid #fff; }
        #hp-fill { height: 100%; background: #2ecc71; width: 100%; transition: 0.2s; }

    </style>
</head>
<body>

    <div id="game-canvas">
        <div id="status-bar">
            <span>💰 <span id="gold">0</span></span>
            <span>🌊 WAVE <span id="wave">1</span></span>
        </div>

        <div id="upgrade-row">
            <button class="btn-up" id="up-atk" onclick="upgradeAtk()">
                <span class="label">Arqueiros Town</span>
                <span class="price">💰 <b id="cost-atk">15</b></span>
            </button>
            <button class="btn-up" id="up-castle" onclick="upgradeCastle()">
                <span class="label">Castelo</span>
                <span class="price">💰 <b id="cost-castle">20</b></span>
            </button>
        </div>

        <div id="main-hero">🛡️</div>

        <div id="castle">
            <div id="hp-container"><div id="hp-fill"></div></div>
            <div id="archer-platform" id="archers-list">
                <div class="town-archer">🏹</div>
            </div>
        </div>
    </div>

    <script>
        let gold = 0; let wave = 1; let castleLvl = 1;
        let archerCount = 1;
        let castleHp = 100; let maxHp = 100;
        let atkDmg = 10; let costAtk = 15; let costCastle = 20;
        let enemies = [];

        const canvas = document.getElementById('game-canvas');
        const platform = document.getElementById('archer-platform');

        function spawnEnemy() {
            const en = document.createElement('div');
            en.className = 'enemy';
            en.style.right = '-60px';
            en.innerHTML = "🧟";
            en.hp = 30 + (wave * 20);
            canvas.appendChild(en);
            enemies.push(en);
        }

        setInterval(() => {
            enemies.forEach(en => {
                let right = parseInt(en.style.right);
                if ((canvas.offsetWidth - right) > 160) {
                    en.style.right = (right + 4) + 'px';
                } else {
                    castleHp -= 1.5;
                    updateUI();
                }
            });
            if (castleHp <= 0) { alert("O Castelo Caiu!"); location.reload(); }
        }, 50);

        // Ataque dos Arqueiros (Efeito de rajada)
        setInterval(() => {
            if (enemies.length > 0) {
                let target = enemies[0];
                
                // Cada arqueiro na plataforma atira uma flecha
                for(let i=0; i < archerCount; i++) {
                    setTimeout(() => {
                        shoot(target, i);
                        target.hp -= (atkDmg / archerCount); 
                        if (target.hp <= 0 && target.parentNode) {
                            target.remove();
                            enemies = enemies.filter(e => e !== target);
                            gold += 20 + wave;
                            updateUI();
                        }
                    }, i * 150); // Delay entre cada flecha para parecer rajada
                }
            } else { spawnEnemy(); wave++; updateUI(); }
        }, 1200);

        function shoot(target, archerIdx) {
            const arrow = document.createElement('div');
            arrow.className = 'arrow';
            arrow.style.left = '90px';
            arrow.style.bottom = (50 + (archerIdx * 2)) + '%';
            canvas.appendChild(arrow);
            
            let targetX = canvas.offsetWidth - parseInt(target.style.right) - 40;
            arrow.style.transition = "all 0.4s ease-out";
            
            setTimeout(() => { 
                arrow.style.left = targetX + "px"; 
                arrow.style.bottom = "20px"; 
            }, 20);
            setTimeout(() => arrow.remove(), 420);
        }

        function upgradeCastle() {
            if (gold >= costCastle) {
                gold -= costCastle; castleLvl++; maxHp += 120; castleHp = maxHp;
                costCastle = Math.floor(costCastle * 1.7);
                if (castleLvl >= 5) document.getElementById('castle').style.background = "#757575";
                updateUI();
            }
        }

        function upgradeAtk() {
            if (gold >= costAtk) {
                gold -= costAtk;
                atkDmg += 15;
                costAtk = Math.floor(costAtk * 1.8);
                
                // Adiciona um novo arqueiro visual a cada 2 upgrades (até 4)
                if (archerCount < 4) {
                    archerCount++;
                    const newArcher = document.createElement('div');
                    newArcher.className = 'town-archer';
                    newArcher.innerHTML = "🏹";
                    platform.appendChild(newArcher);
                }
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('gold').innerText = gold;
            document.getElementById('wave').innerText = wave;
            document.getElementById('cost-atk').innerText = costAtk;
            document.getElementById('cost-castle').innerText = costCastle;
            document.getElementById('up-atk').disabled = gold < costAtk;
            document.getElementById('up-castle').disabled = gold < costCastle;
            document.getElementById('hp-fill').style.width = (castleHp / maxHp * 100) + "%";
        }
        updateUI();
    </script>
</body>
    </html>
